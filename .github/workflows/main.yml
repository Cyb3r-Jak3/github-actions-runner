name: Docker

on:
  push:
    branches:
      - "main"
    tags:
      - 'v*'
  pull_request:
    branches:
      - "main"
    paths:
      - .github/workflows/main.yml
      - 'Dockerfile'
      - 'pre-hook.sh'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up Docker
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login To GitHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          flavor: |
            latest=true
          images: ghcr.io/cyb3r-jak3/github-actions-runner
          labels: |
            org.label-schema.vcs-url=https://github.com/Cyb3r-Jak3/github-actions-runner.git
            org.label-schema.schema-version=1.0.0-rc1
            maintainer=Cyb3r Jak3 git@cyberjake.xyz
            org.opencontainers.image.vendor=cyb3rjak3

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: https://tracing.monitoring.jwhite.network
          OTEL_EXPORTER_OTLP_HEADERS: Authorization=Basic ${{ secrets.OTEL_EXPORTER_BASIC_AUTH_B64 }}
          OTEL_SERVICE_NAME: github-actions-runner
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
          load: ${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Test Run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            --env GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            ${{ steps.build.outputs.imageid }} -c '
              tenv version && \
              terraform-docs --version && \
              yq --version && \
              aws --version && \
              docker buildx version && \
              docker compose version && \
              node -v && \
              helm version && \
              op --version && \
              cloudflare-utils --version && \
              cosign version && \
              goreleaser --version
            '

      - name: GitHub Container Attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        id: attest
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        with:
          subject-name: ghcr.io/cyb3r-jak3/github-actions-runner
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

